name: Build and Upload Artifacts

on:
  push:
    branches: [ "*" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "*" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run Tests
        run: go test -v ./...

      - name: Build Binaries
        run: |
          mkdir -p dist
          DIRTY=$([ -z "$(git status --porcelain)" ] || echo "-dirty")
          BASE_VER=$(git describe --exact-match --tags HEAD 2>/dev/null || git rev-list --count HEAD)
          VERSION="${BASE_VER}${DIRTY}"
          LDFLAGS="-s -w -X main.Version=$VERSION"
          
          # Build for Linux (AMD64)
          GOOS=linux GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/syncthing-socket-linux-amd64 .
          
          # Build for macOS (Intel)
          GOOS=darwin GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/syncthing-socket-darwin-amd64 .
          
          # Build for macOS (Apple Silicon M1/M2/M3)
          GOOS=darwin GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/syncthing-socket-darwin-arm64 .
          
          # Build for Windows (AMD64)
          GOOS=windows GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/syncthing-socket-windows-amd64.exe .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: syncthing-socket-binaries
          path: dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
          generate_release_notes: true
