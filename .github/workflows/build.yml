name: Build and Upload Artifacts

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run Tests
        run: go test -v ./...

      - name: Build Binaries
        run: |
          mkdir -p dist
          # Build for Linux (AMD64)
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/syncthing-socket-linux-amd64 main.go
          
          # Build for macOS (Intel)
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/syncthing-socket-darwin-amd64 main.go
          
          # Build for macOS (Apple Silicon M1/M2/M3)
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/syncthing-socket-darwin-arm64 main.go
          
          # Build for Windows (AMD64)
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/syncthing-socket-windows-amd64.exe main.go

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: syncthing-socket-binaries
          path: dist/*
