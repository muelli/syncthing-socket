<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="400" height="200">
  <defs>
    <!-- Syncthing blue -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a75d3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B58B8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Left Side: Syncthing Nodes -->
  <path d="M 60 25 L 30 75 L 90 75 Z" fill="none" stroke="url(#grad1)" stroke-width="8" stroke-linejoin="round"/>
  <circle cx="60" cy="25" r="12" fill="url(#grad1)"/>
  <circle cx="30" cy="75" r="12" fill="url(#grad1)"/>
  <circle cx="90" cy="75" r="12" fill="url(#grad1)"/>

  <!-- Wire connecting the right node to the plug -->
  <path d="M 90 75 Q 115 75 125 50 T 145 50" fill="none" stroke="#555555" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Power Plug Base -->
  <rect x="145" y="38" width="24" height="24" rx="4" fill="#333333"/>
  <rect x="162" y="35" width="7" height="30" rx="2" fill="#222222"/>

  <!-- Power Plug Prongs -->
  <rect x="169" y="42" width="18" height="5" rx="1" fill="#999999"/>
  <rect x="169" y="53" width="18" height="5" rx="1" fill="#999999"/>
</svg>
